gn:center;color:var(--sub);font-size:13px;display:none}

function recentWeeks(n){
  var arr=[]; var now=mondayOf();
  for(var i=n-1;i>=0;i--) arr.push(shiftWeek(now,-i));
  return arr;
}
function weekTotals(wk){
  var s={inq:0,con:0,pay:0,rev:0};
  BIZ.forEach(function(b){ var m=(state.metrics[wk]||{})[b.id]; if(m){s.inq+=+m.inq||0;s.con+=+m.con||0;s.pay+=+m.pay||0;s.rev+=+m.rev||0;} });
  return s;
}
function pct(a,b){ return b?Math.round(a/b*100):0; }
function shortMoney(n){ n=+n||0; if(n>=100000000)return (n/100000000).toFixed(n%100000000?1:0)+"억"; if(n>=10000)return Math.round(n/10000)+"만"; return fmt(n); }
function vAnalytics(){
  var weeks=recentWeeks(8);
  var series=weeks.map(function(w){return {wk:w,data:weekTotals(w)};});
  var maxRev=Math.max.apply(null,series.map(function(x){return x.data.rev;} ).concat([1]));
  var bars=series.map(function(x){
    var h=Math.max(2,Math.round(x.data.rev/maxRev*100));
    return '<div class="bar-col"><div class="bar-value">'+shortMoney(x.data.rev)+'</div><div class="bar-fill" style="height:'+h+'%" title="'+fmt(x.data.rev)+'원"></div><div class="bar-label">'+weekLabel(x.wk).split(" ~ ")[0]+'</div></div>';
  }).join("");
  var four=series.slice(-4), sum={inq:0,con:0,pay:0,rev:0};
  four.forEach(function(x){sum.inq+=x.data.inq;sum.con+=x.data.con;sum.pay+=x.data.pay;sum.rev+=x.data.rev;});
  var bizData=BIZ.map(function(b){
    var s={inq:0,con:0,pay:0,rev:0};
    four.forEach(function(x){var m=(state.metrics[x.wk]||{})[b.id];if(m){s.inq+=+m.inq||0;s.con+=+m.con||0;s.pay+=+m.pay||0;s.rev+=+m.rev||0;}});
    return {biz:b,data:s};
  });
  var maxBiz=Math.max.apply(null,bizData.map(function(x){return x.data.rev;}).concat([1]));
  var compare=bizData.map(function(x){return '<div class="compare-row"><b>'+esc(x.biz.short)+'</b><div class="compare-track"><div class="compare-fill" style="--bc:'+x.biz.color+';width:'+Math.round(x.data.rev/maxBiz*100)+'%"></div></div><span class="num">'+shortMoney(x.data.rev)+'원</span></div>';}).join("");
  var best=bizData.slice().sort(function(a,b){return b.data.rev-a.data.rev;})[0];
  var insight=[];
  if(!sum.inq&&!sum.con&&!sum.pay&&!sum.rev) insight.push("최근 4주 실적이 비어 있습니다. 주간 실적을 입력하면 분석이 자동으로 생성됩니다.");
  else{
    if(sum.inq && pct(sum.con,sum.inq)<50) insight.push("문의 대비 상담 전환율이 "+pct(sum.con,sum.inq)+"%입니다. 미응답 문의와 상담 예약 과정을 점검해 보세요.");
    if(sum.con && pct(sum.pay,sum.con)<30) insight.push("상담 대비 결제 전환율이 "+pct(sum.pay,sum.con)+"%입니다. 보류 사유를 상담 메모에 남기면 개선 지점을 찾기 쉽습니다.");
    if(best&&best.data.rev>0) insight.push("최근 4주 매출 기여가 가장 큰 사업은 "+best.biz.name+"입니다.");
  }
  var mc=state.cash.filter(function(c){return c.month===monthStr();}), inc=0,out=0;
  mc.forEach(function(c){if(c.type==="수입")inc+=+c.amount||0;else out+=+c.amount||0;});
  return '<h1>분석 리포트</h1><div class="sub">입력된 운영 데이터를 최근 4주와 8주 흐름으로 자동 분석합니다.</div>'+
  '<div class="card"><div class="row" style="justify-content:space-between;margin-bottom:10px"><h2 style="margin:0">최근 8주 매출 추이</h2><button class="btn sm ghost" onclick="App.exportMetricsCSV()">실적 CSV 내려받기</button></div><div class="chart-wrap"><div class="bar-chart">'+bars+'</div></div></div>'+
  '<div class="grid2"><div class="card"><h2 style="margin-top:0">최근 4주 전환 퍼널</h2><div class="funnel">'+
    '<div class="funnel-step"><span>문의·신청</span><b>'+fmt(sum.inq)+'</b><small>유입 100%</small></div>'+
    '<div class="funnel-step"><span>상담</span><b>'+fmt(sum.con)+'</b><small>문의 대비 '+pct(sum.con,sum.inq)+'%</small></div>'+
    '<div class="funnel-step"><span>등록·결제</span><b>'+fmt(sum.pay)+'</b><small>상담 대비 '+pct(sum.pay,sum.con)+'%</small></div>'+
  '</div></div><div class="card"><h2 style="margin-top:0">이번 달 현금 신호</h2><div class="grid2">'+kpi("수입",'<span class="plus">'+fmt(inc)+'원</span>')+kpi("지출",'<span class="minus">'+fmt(out)+'원</span>')+kpi("순현금흐름",fmt(inc-out)+'원')+kpi("최근 4주 매출",fmt(sum.rev)+'원')+'</div></div></div>'+
  '<div class="grid2"><div class="card"><h2 style="margin-top:0">사업별 최근 4주 매출 비교</h2><div class="compare">'+compare+'</div></div>'+
  '<div class="card"><h2 style="margin-top:0">자동 점검</h2>'+insight.map(function(x){return '<div class="alert">'+esc(x)+'</div>';}).join("")+'</div></div>';
}

function ask(){
  var inp = document.getElementById("aiInput");
  var q = inp.value.trim();
  if(!q) return;
  if(!state.settings.apiKey){ setAIStatus("설정에서 API 키를 먼저 입력해주세요."); return; }
  state.chat.push({role:"user", text:q});
  if(state.chat.length>40) state.chat = state.chat.slice(-40);
  save(); render();
  setAIStatus("생각하는 중…");
  var msgs = state.chat.map(function(m){ return {role: m.role==="user"?"user":"assistant", content: m.text}; });
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "content-type":"application/json",
      "x-api-key": state.settings.apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body: JSON.stringify({ model: state.settings.model, max_tokens: 1500,
      system: SYS_PROMPT+"\n\n=== 대시보드 데이터 ===\n"+buildContext(), messages: msgs })
  }).then(function(res){ return res.json(); }).then(function(data){
    if(data && data.content && data.content.length){
      var txt = data.content.map(function(c){ return c.text||""; }).join("");
      state.chat.push({role:"ai", text:txt});
      save(); render(); setAIStatus("");
    } else if(data && data.error){
      var m = data.error.message||"오류";
      if(data.error.type==="authentication_error") m = "API 키가 올바르지 않습니다. 설정에서 다시 확인해주세요.";
      setAIStatus("⚠️ "+m);
    } else { setAIStatus("⚠️ 알 수 없는 응답입니다."); }
  }).catch(function(e){ setAIStatus("⚠️ 연결 실패: 인터넷 연결과 API 키를 확인해주세요. ("+e.message+")"); });
}

function fetchIdeas(){
  if(!state.settings.apiKey) return;
  var el = document.getElementById("sugStatus"); if(el) el.textContent = "웹검색 중… 최대 30초 정도 걸립니다.";
  var prompt = "오늘은 "+todayStr()+"이다. 한국 중·고등 학부모와 학생 대상 교육 콘텐츠 아이디어가 필요하다. 웹검색으로 최근 입시 뉴스, 정책 변화, 이 시기 학사 이슈를 확인한 뒤, 다음 7개 분야에서 총 10~14개의 콘텐츠 아이디어를 제안하라: "+CATS7.join(", ")+". 각 아이디어는 사람들이 멈춰보게 만드는 구체적인 한 줄 관점으로 쓴다. 출력 형식: 한 줄에 하나씩 '분야|아이디어' 형태로만 쓰고 다른 설명은 하지 마라.";
  fetch("https://api.anthropic.com/v1/messages",{ method:"POST", headers:{ "content-type":"application/json","x-api-key":state.settings.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify({ model: state.settings.model, max_tokens: 1500, tools:[{type:"web_search_20250305", name:"web_search", max_uses:3}], messages:[{role:"user", content: prompt}] })
  }).then(function(res){return res.json();}).then(function(data){
    if(data && data.content){
      var txt = data.content.filter(function(c){return c.type==="text";}).map(function(c){return c.text||"";}).join("\n");
      var items = [];
      txt.split("\n").forEach(function(ln){ var p=ln.split("|"); if(p.length>=2){ var cat=p[0].replace(/^[\s\-\*\d\.\)]+/,"").trim(); var tx=p.slice(1).join("|").trim(); if(cat && tx && cat.length<=12) items.push({cat:cat, text:tx}); } });
      if(items.length){ state.suggest={items:items, at:todayStr()}; save(); render(); }
      else { var e1=document.getElementById("sugStatus"); if(e1) e1.textContent="⚠️ 응답을 이해하지 못했습니다. 다시 시도해주세요."; }
    } else if(data && data.error){ var e2=document.getElementById("sugStatus"); if(e2) e2.textContent="⚠️ "+(data.error.message||"오류"); }
  }).catch(function(e){ var e3=document.getElementById("sugStatus"); if(e3) e3.textContent="⚠️ 연결 실패: "+e.message; });
}
function fillColumnAI(c){
  if(!state.settings.apiKey){ alert("설정에서 API 키를 먼저 입력해주세요."); return; }
  var tp = state.grid.topics[c];
  if(!tp){ alert("먼저 이 열의 주제 칸을 채워주세요."); return; }
  var el = document.getElementById("sugStatus"); if(el) el.textContent = '"'+tp+'" 주제를 5개 포맷으로 바꾸는 중…';
  var fmts = state.grid.formats.map(function(f,i){ return (i+1)+". "+(f||("포맷"+(i+1))); }).join("\n");
  var prompt = "너는 한국 중·고등 학부모와 학생 대상 교육 콘텐츠 기획자다. 큰 주제: \""+tp+"\". 아래 5개 포맷 각각에 맞게, 이 주제를 사람들이 멈춰보게 만드는 구체적인 한 줄 콘텐츠 관점으로 바꿔라.\n"+fmts+"\n출력 형식: 정확히 5줄, 위 포맷 순서대로, 각 줄은 '포맷이름|한 줄 관점'. 다른 설명 금지.";
  fetch("https://api.anthropic.com/v1/messages",{ method:"POST", headers:{ "content-type":"application/json","x-api-key":state.settings.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify({ model: state.settings.model, max_tokens: 800, messages:[{role:"user", content: prompt}] })
  }).then(function(res){return res.json();}).then(function(data){
    if(data && data.content){
      var txt = data.content.filter(function(x){return x.type==="text";}).map(function(x){return x.text||"";}).join("\n");
      var arr = [];
      txt.split("\n").forEach(function(ln){ var p=ln.split("|"); if(p.length>=2){ var tx=p.slice(1).join("|").trim(); if(tx) arr.push(tx); } });
      if(!arr.length){ var e0=document.getElementById("sugStatus"); if(e0) e0.textContent="⚠️ 응답을 이해하지 못했습니다. 다시 시도해주세요."; return; }
      var n=0, skip=0;
      for(var r=0;r<5 && r<arr.length;r++){
        var cell = gridCell(r,c);
        if(cell.text){ skip++; } else { cell.text = arr[r]; n++; }
      }
      save(); render();
      var e1=document.getElementById("sugStatus"); if(e1) e1.textContent='"'+tp+'" 열에 '+n+'칸 채움'+(skip? " (이미 적힌 "+skip+"칸은 그대로 둠)":"");
    } else if(data && data.error){ var e2=document.getElementById("sugStatus"); if(e2) e2.textContent="⚠️ "+(data.error.message||"오류"); }
  }).catch(function(e){ var e4=document.getElementById("sugStatus"); if(e4) e4.textContent="⚠️ 연결 실패: "+e.message; });
}

function mktCompliance(x){
  var issues=[],warnings=[],text=[x.title,x.hook,x.body,x.cta].join(' '),s=state.marketing.settings||{};
  if(!x.title)issues.push('제목이 없습니다.');

  if(!x.channels||!x.channels.length)issues.push('발행 채널이 선택되지 않았습니다.');
  if(/100%|무조건|반드시 합격|성적 보장|전교.?1등 보장|완벽 보장/.test(text))issues.push('합격·성적을 보장하거나 단정하는 표현이 있습니다.');
  if(/실명|학생 얼굴|생활기록부 원문|성적표 원본/.test(text))warnings.push('학생 개인정보·초상권 자료 포함 여부를 직접 확인하세요.');
  if(/최고|유일|압도적|1위/.test(text))warnings.push('최상급 표현의 객관적 근거를 확인하세요.');
  if(/합격|입결|성적 향상|등급 상승/.test(text))warnings.push('성과 표현의 사실 근거와 학생 동의 여부를 확인하세요.');
  if(x.brand==='academy'){
    if(!s.academyReg)issues.push('학원 등록번호가 설정되지 않았습니다.');
    if(!s.academyCourse)issues.push('교습과정·교습과목이 설정되지 않았습니다.');
    if(!s.academyFee)issues.push('교습비등 표시정보가 설정되지 않았습니다.');
    if(/무료/.test(text))warnings.push('무료 제공의 대상·기간·조건을 명확히 표시하세요.');

  }

    ? '브랜드: 에듀케레 영수학원·바른학습관(경남 양산). 독자는 지역 학부모다. 학원 광고 규정을 지켜야 한다.'
    : '브랜드: 에바연 학생부설계실(전국 온라인 학생부 설계 서비스). 독자는 고등학생 본인과 학부모다. 본문의 주인공은 학생이며 "나·내"의 1인칭 시선으로 쓴다.';
  return '너는 한국 중·고등 교육 브랜드의 콘텐츠 작가다.\n'+brandLine+'\n'+
    '콘텐츠 유형: '+(x.type||'정보형')+'\n포맷: '+(x.format||'자유')+'\n발행 채널: '+((x.channels||[]).join(', ')||'미정')+'\n주제: '+x.title+'\n\n'+
    '반드시 지킬 규칙\n'+
    '1. 합격·성적을 보장하거나 단정하는 표현(100%, 무조건, 반드시 합격, 성적 보장)을 쓰지 마라.\n'+
    '2. 최고·유일·압도적·1위 같은 최상급 표현을 쓰지 마라.\n'+
    '3. 확인되지 않은 후기·합격 사례·수치·만족도를 지어내지 마라. 예시는 일반적인 상황으로 쓰고 특정 학생의 실적처럼 보이게 하지 마라.\n'+
    '4. 과장 없이, 독자가 오늘 바로 해볼 수 있는 구체적인 내용을 담아라.\n\n'+
    (fixes&&fixes.length ? '이전 초안에서 아래 문제가 지적되었다. 반드시 고쳐서 다시 써라.\n- '+fixes.join('\n- ')+'\n\n' : '')+
    '출력 형식(다른 설명 금지)\n[훅]\n(멈춰보게 만드는 첫 문장 1~2줄)\n[본문]\n(핵심 정보·근거·예시를 채널 분량에 맞게 5~12줄)\n[CTA]\n(행동 유도 한 줄)';
}
function parseMktDraft(t){
  var g=function(tag,next){ var m=t.match(new RegExp('\\['+tag+'\\]\\s*([\\s\\S]*?)(?=\\['+next+'\\]|$)')); return m?m[1].trim():''; };
  var d={hook:g('훅','본문'), body:g('본문','CTA'), cta:g('CTA','__끝__')};
  if(!d.hook&&!d.body) d.body=t.trim();
  return d;
}
function aiDraftMkt(retry){
  if(!state.settings.apiKey){ alert('설정에서 API 키를 먼저 입력해주세요.'); return; }
  var x=App.readStudio();
  if(!x.title){ alert('주제·제목을 먼저 입력하세요.'); return; }
  var st=document.getElementById('studioStatus');
  if(st) st.textContent = retry ? '검수에서 걸린 표현을 고쳐 다시 쓰는 중…' : 'AI가 초안을 쓰는 중… 10~20초 정도 걸립니다.';
  fetch("https://api.anthropic.com/v1/messages",{ method:"POST", headers:{ "content-type":"application/json","x-api-key":state.settings.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify({ model: state.settings.model, max_tokens:1600, messages:[{role:"user", content: mktDraftPrompt(x, retry&&retry.fixes)}] })
  }).then(function(res){return res.json();}).then(function(data){
    var el=document.getElementById('studioStatus');
    if(data && data.content){
      var txt=data.content.filter(function(c){return c.type==="text";}).map(function(c){return c.text||"";}).join("\n");
      var d=parseMktDraft(txt);
      if(!d.hook && !d.body){ if(el) el.textContent="⚠️ 응답을 이해하지 못했습니다. 다시 시도해주세요."; return; }
      var set=function(id,v){ var n=document.getElementById(id); if(n && v) n.value=v; };
      set('mktHook',d.hook); set('mktBody',d.body); set('mktCta',d.cta);
      App.previewMkt();
      var c=mktCompliance(App.readStudio());
      var fixable=c.issues.concat(c.warnings).filter(function(v){ return v.indexOf('설정되지')<0 && v.indexOf('채널이 선택')<0 && v.indexOf('제목이 없')<0; });
      if(!retry && fixable.length){ aiDraftMkt({fixes:fixable}); return; }
      if(el) el.textContent = c.level==='pass'
        ? '초안 완성 · 자동 검수 통과. 내용을 직접 확인한 뒤 저장하세요.'
        : '초안 완성 · 오른쪽 검수 상자의 확인 항목을 보고 손질하세요.';
    } else if(data && data.error){ if(el) el.textContent="⚠️ "+(data.error.message||"오류"); }
  }).catch(function(e){ var el2=document.getElementById('studioStatus'); if(el2) el2.textContent="⚠️ 연결 실패: "+e.message; });
}

function autoFmtNext(dt){
  var wd=["일","월","화","수","목","금","토"];
  return (dt.getMonth()+1)+"월 "+dt.getDate()+"일("+wd[dt.getDay()]+") "+String(dt.getHours()).padStart(2,"0")+":00";
}
function autoNextRun(a){
  try{
    var now = new Date();
    if(a.cad==="weekday"){
      for(var i=0;i<15;i++){
        var c = new Date(now.getFullYear(), now.getMonth(), now.getDate()+i, a.hour, 0, 0, 0);
        var dow = c.getDay();
        if(dow>=1 && dow<=5 && c>now) return autoFmtNext(c);
      }
    } else if(a.cad==="monthly"){
      var m = new Date(now.getFullYear(), now.getMonth(), a.day, a.hour, 0, 0, 0);
      if(m<=now) m = new Date(now.getFullYear(), now.getMonth()+1, a.day, a.hour, 0, 0, 0);
      return autoFmtNext(m);
    }
  }catch(e){}
  return a.when;
}

    '</div>';
  }).join("");
  return '<h1>🔁 자동 예약 작업 (Claude)</h1>'+
    '<div class="sub">정해진 시간에 Claude가 스스로 실행해 결과물을 보내주는 작업입니다. 실행은 이 대시보드가 아니라 Claude 쪽에 등록되며, 이 화면은 그 현황판입니다.</div>'+
    '<div class="alert'+(on?'':' red')+'"><b>연결 '+on+' / '+AUTO_TASKS.length+'건</b><br>'+
      (on===AUTO_TASKS.length
        ? '모든 작업이 연결되어 있습니다. 시간·내용을 바꾸거나 멈추려면 Claude에게 말씀해 주세요. (예: "블로그 초안 작업을 오전 9시로 바꿔줘")'
        : (on
          ? '연결된 작업만 실제로 실행됩니다. 미연결 작업은 아직 계획 단계입니다.'
          : '아래 작업들은 아직 <b>계획만 적혀 있고 실제로 예약되어 있지 않습니다.</b> 지금은 시간이 되어도 실행되지 않고 결과물도 오지 않습니다.'))+
    '</div>'+
    '<div class="grid2">'+cards+'</div>'+
    '<div class="card" style="margin-top:16px"><h2 style="margin-top:0">실제로 연결하려면</h2>'+
    '<div class="task"><span>1</span><label>Claude에게 예약을 요청합니다. 예: "입시뉴스 아침 브리핑을 평일 오전 7시에 예약해줘"</label></div>'+
