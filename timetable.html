<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>오르다 ORDA · 시간표 편집기</title>
<style>
:root{--navy:#1F3864;--navy2:#2E4C74;--coral:#C0512F;--coral2:#E07A5F;--cream:#FBF6EF;--ink:#20242C;--muted:#7c7a74;--line:#e7ded2;--card:#fff;--ok:#2f7d5b;--warn:#C0512F}
*{box-sizing:border-box}
body{margin:0;background:var(--cream);color:var(--ink);font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.wrap{max-width:1120px;margin:0 auto;padding:22px 20px 60px}
header{border-bottom:3px solid var(--navy);padding-bottom:14px;margin-bottom:14px}
.brand{font-size:12.5px;font-weight:700;letter-spacing:.06em;color:var(--coral)}
h1{font-size:24px;margin:6px 0 3px;color:var(--navy);font-weight:800}
.sub{font-size:12.5px;color:var(--muted);margin:0}
.toolbar{position:sticky;top:0;z-index:20;background:var(--cream);display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);margin-bottom:6px}
.btn{background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--navy)}
.btn:hover{background:#f6efe6}
.btn.pri{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.pri:hover{background:#2a4a7d}
.btn.warn{color:var(--coral)}
.spacer{flex:1}
.status{font-size:12.5px;padding:8px 12px;border-radius:9px;margin:8px 0 14px;line-height:1.6}
.status.good{background:#e9f4ee;color:var(--ok);border:1px solid #cbe6d7}
.status.bad{background:#fbeee9;color:var(--warn);border:1px solid #f2d6c9}
.status ul{margin:4px 0 0;padding-left:18px}
.status .info{color:var(--muted);font-weight:400}
.legend{display:flex;gap:16px;align-items:center;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin:0 0 18px}
.legend .k{display:flex;align-items:center;gap:6px;font-weight:700;color:var(--ink)}
.legend i{width:14px;height:14px;border-radius:4px;display:inline-block}
.legend i.e{background:var(--coral)}.legend i.m{background:var(--navy2)}
.legend .hint{font-weight:400}
.day{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px}
.day.we{background:#FCF3EE;border-color:#f0d8ca}
.dh{font-size:17px;font-weight:800;color:var(--navy);margin:0 0 8px}
.day.we .dh{color:var(--coral)}
.ln{display:flex;align-items:stretch;margin:3px 0}
.rm{flex:0 0 56px;font-size:12.5px;font-weight:700;color:var(--muted);display:flex;align-items:center}
.tk{position:relative;flex:1;min-height:80px;border-left:1px dashed var(--line);border-radius:6px}
.tk.empty{min-height:24px;background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(0,0,0,.02) 8px,rgba(0,0,0,.02) 9px)}
.tk.drop{background:#eef4fb;outline:2px dashed var(--navy2);outline-offset:-2px}
.rlt{min-height:16px;border:none}
.rlt span{position:absolute;transform:translateX(-50%);font-size:12px;color:var(--muted)}
.b{position:absolute;top:3px;bottom:3px;border-radius:9px;padding:6px 9px;color:#fff;overflow:hidden;cursor:grab;border:2px solid transparent}
.b:active{cursor:grabbing}
.b.e{background:var(--coral)}.b.m{background:var(--navy2)}
.b.err{border-color:#ffd23f;box-shadow:0 0 0 2px rgba(255,210,63,.5)}
.b b{display:block;font-size:13px;font-weight:700;line-height:1.25;pointer-events:none}
.b span{display:block;font-size:12.5px;opacity:.92;margin:2px 0 4px;pointer-events:none}
.b em{display:block;font-size:12.5px;font-style:normal;line-height:1.4;word-break:keep-all;pointer-events:none}
.ov{position:fixed;inset:0;background:rgba(20,25,35,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
.ov.on{display:flex}
.modal{background:#fff;border-radius:16px;max-width:440px;width:100%;padding:20px 22px;max-height:90vh;overflow:auto}
.modal h3{margin:0 0 14px;color:var(--navy);font-size:17px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:4px}
.fld select,.fld input,.fld textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;color:var(--ink);background:#fff}
.fld textarea{min-height:70px;resize:vertical;line-height:1.5}
.row2{display:flex;gap:10px}.row2>*{flex:1}
.mact{display:flex;gap:8px;margin-top:16px}
.mact .btn{flex:1;text-align:center}
.mnote{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.5}
footer{text-align:center;color:var(--muted);font-size:11.5px;margin-top:22px}
@media print{
 body{background:#fff}.toolbar,.ov,.legend .hint,.btn{display:none}
 .tk.empty{display:none}.wrap{max-width:none;padding:0}.day{break-inside:avoid}
 .status{display:none}
 @page{margin:10mm}
}
</style></head>
<body><div class="wrap">
<header>
 <div class="brand">EDUCERE · 오르다 ORDA · 편집기</div>
 <h1>에듀케레 영수학원 주간 시간표</h1>
 <p class="sub">블록을 클릭하면 수정, 드래그하면 다른 교실·요일로 이동. 바꿀 때마다 충돌을 자동으로 검사합니다.</p>
</header>

<div class="toolbar">
 <button class="btn pri" onclick="addSession()">+ 수업 추가</button>
 <button class="btn" onclick="printIt()">인쇄 / PDF</button>
 <button class="btn" onclick="exportJSON()">파일로 저장</button>
 <button class="btn" onclick="document.getElementById('imp').click()">파일 불러오기</button>
 <input id="imp" type="file" accept="application/json" style="display:none" onchange="importJSON(event)">
 <div class="spacer"></div>
 <button class="btn warn" onclick="resetAll()">처음 상태로 되돌리기</button>
</div>

<div id="status" class="status good"></div>

<div class="legend">
 <span class="k"><i class="e"></i>영어</span>
 <span class="k"><i class="m"></i>수학</span>
 <span class="hint">블록 길이 = 실제 수업시간 · 같은 시각 같은 색 2개 = 그 과목 강사 2명 필요 · 노란 테두리 = 확인 필요</span>
</div>

<div id="board"></div>

<footer>에듀케레 바른교육연구소 · 오르다(ORDA) — 변경사항은 이 브라우저에 자동 저장됩니다. 다른 기기로 옮기려면 “파일로 저장”을 쓰세요.</footer>
</div>

<div class="ov" id="ov">
 <div class="modal">
  <h3 id="mtitle">수업 편집</h3>
  <input type="hidden" id="f_id">
  <div class="row2">
   <div class="fld"><label>요일</label><select id="f_day"></select></div>
   <div class="fld"><label>과목</label><select id="f_sub"><option value="E">영어</option><option value="M">수학</option></select></div>
  </div>
  <div class="row2">
   <div class="fld"><label>교실</label><select id="f_room"></select></div>
   <div class="fld"><label>시작 시각</label><select id="f_start"></select></div>
   <div class="fld"><label>수업시간</label><select id="f_dur"><option value="90">90분</option><option value="120">120분</option><option value="150">150분</option></select></div>
  </div>
  <div class="fld"><label>반 이름</label><input id="f_ban" type="text" placeholder="예: 중3-A반"></div>
  <div class="fld"><label>학생 (띄어쓰기 또는 줄바꿈으로 구분)</label><textarea id="f_students" placeholder="예: 홍길동 김철수"></textarea></div>
  <div class="mnote" id="f_warn"></div>
  <div class="mact">
   <button class="btn warn" onclick="delSession()">삭제</button>
   <button class="btn" onclick="closeModal()">닫기</button>
   <button class="btn pri" onclick="applyEdit()">적용</button>
  </div>
 </div>
</div>

<script>
const DEFAULT = {"sessions": [{"id": "s1", "day": "월", "start": "16:00", "dur": 120, "room": 1, "sub": "E", "ban": "기초반", "students": ["나하민", "나예송", "나하준", "노희서", "김도희"]}, {"id": "s2", "day": "월", "start": "16:00", "dur": 120, "room": 3, "sub": "E", "ban": "중3-B반", "students": ["오이삭", "배채훈", "류수인", "정인서", "이명서"]}, {"id": "s3", "day": "월", "start": "18:00", "dur": 120, "room": 1, "sub": "M", "ban": "기초반", "students": ["나하민", "나예송", "나하준"]}, {"id": "s4", "day": "월", "start": "18:30", "dur": 120, "room": 4, "sub": "M", "ban": "고2반", "students": ["김효은", "이소민", "신우준"]}, {"id": "s5", "day": "월", "start": "18:30", "dur": 120, "room": 5, "sub": "E", "ban": "고1·고3반", "students": ["박시연", "신채연"]}, {"id": "s6", "day": "화", "start": "17:00", "dur": 120, "room": 2, "sub": "E", "ban": "중3-A반", "students": ["곽혜리", "김형은", "김경용", "전진헌", "박선영", "박세은"]}, {"id": "s7", "day": "화", "start": "18:30", "dur": 120, "room": 4, "sub": "E", "ban": "고2반", "students": ["김효은", "김성은", "박제영", "박소연"]}, {"id": "s8", "day": "화", "start": "18:30", "dur": 120, "room": 5, "sub": "M", "ban": "고1·고3반", "students": ["박시연", "홍정민", "박정효"]}, {"id": "s9", "day": "화", "start": "19:00", "dur": 120, "room": 2, "sub": "M", "ban": "중3-A반", "students": ["곽혜리", "김형은"]}, {"id": "s10", "day": "수", "start": "16:00", "dur": 120, "room": 1, "sub": "E", "ban": "기초반", "students": ["나하민", "나예송", "나하준", "노희서", "김도희"]}, {"id": "s11", "day": "수", "start": "16:00", "dur": 120, "room": 2, "sub": "M", "ban": "중3-A반", "students": ["곽혜리", "김형은"]}, {"id": "s12", "day": "수", "start": "16:00", "dur": 120, "room": 3, "sub": "E", "ban": "중3-B반", "students": ["오이삭", "배채훈", "류수인", "정인서", "이명서"]}, {"id": "s13", "day": "수", "start": "18:00", "dur": 120, "room": 1, "sub": "M", "ban": "기초반", "students": ["나하민", "나예송", "나하준"]}, {"id": "s14", "day": "수", "start": "18:30", "dur": 120, "room": 4, "sub": "M", "ban": "고2반", "students": ["김효은", "이소민", "신우준"]}, {"id": "s15", "day": "수", "start": "18:30", "dur": 120, "room": 5, "sub": "E", "ban": "고1·고3반", "students": ["박시연", "신채연"]}, {"id": "s16", "day": "목", "start": "17:00", "dur": 120, "room": 2, "sub": "E", "ban": "중3-A반", "students": ["곽혜리", "김형은", "김경용", "전진헌", "박선영", "박세은"]}, {"id": "s17", "day": "목", "start": "18:30", "dur": 120, "room": 4, "sub": "E", "ban": "고2반", "students": ["김효은", "김성은", "박제영", "박소연"]}, {"id": "s18", "day": "목", "start": "18:30", "dur": 120, "room": 5, "sub": "M", "ban": "고1·고3반", "students": ["박시연", "홍정민", "박정효"]}, {"id": "s19", "day": "목", "start": "19:00", "dur": 120, "room": 2, "sub": "M", "ban": "중3-A반", "students": ["곽혜리", "김형은"]}, {"id": "s20", "day": "금", "start": "16:00", "dur": 120, "room": 1, "sub": "M", "ban": "기초반", "students": ["나하민", "나예송", "나하준"]}, {"id": "s21", "day": "금", "start": "18:30", "dur": 120, "room": 4, "sub": "M", "ban": "고2반", "students": ["김효은", "이소민", "신우준"]}, {"id": "s22", "day": "금", "start": "18:30", "dur": 120, "room": 5, "sub": "M", "ban": "고1·고3반", "students": ["박시연", "홍정민", "박정효"]}, {"id": "s23", "day": "토", "start": "10:00", "dur": 120, "room": 4, "sub": "E", "ban": "주말영어반", "students": ["최호성", "전하원", "김관중", "박시은"]}, {"id": "s24", "day": "토", "start": "13:00", "dur": 120, "room": 4, "sub": "E", "ban": "주말영어반", "students": ["최호성", "전하원", "김관중", "박시은"]}]};
const GRADES = {"나하민": "초6", "나예송": "중1", "나하준": "중2", "노희서": "중1", "김도희": "중2", "곽혜리": "중3", "김형은": "중3", "김경용": "중3", "전진헌": "중3", "박선영": "중3", "박세은": "중3", "오이삭": "중3", "배채훈": "중3", "류수인": "중3", "정인서": "중3", "이명서": "중3", "김효은": "고2", "이소민": "고2", "신우준": "고2", "김성은": "고2", "박제영": "고2", "박소연": "고2", "박시연": "고1", "신채연": "고3", "홍정민": "고1", "박정효": "고3", "최호성": "고1", "전하원": "고2", "김관중": "고2", "박시은": "고2"};
const KEY='orda_timetable_v1';
const WD=['월','화','수','목','금'], WE=['토','일'], DAYS=['월','화','수','목','금','토','일'];
const DAYN={월:'월요일',화:'화요일',수:'수요일',목:'목요일',금:'금요일',토:'토요일',일:'일요일'};
let state=load();

function load(){try{const s=localStorage.getItem(KEY);if(s)return JSON.parse(s);}catch(e){}return clone(DEFAULT);}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function clone(o){return JSON.parse(JSON.stringify(o));}
function toMin(t){const[a,b]=t.split(':').map(Number);return a*60+b;}
function fmt(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}
function axis(day){return WD.includes(day)?[900,1350]:[540,900];}
function rulerH(day){return WD.includes(day)?[15,16,17,18,19,20,21,22]:[9,10,11,12,13,14,15];}
function pct(v,t0,t1){return (v-t0)/(t1-t0)*100;}
function uid(){return 's'+Date.now().toString(36)+Math.floor(Math.random()*1e3);}

function render(){
 const errs=validate(false);
 const errIds=new Set(errs.blockIds);
 let h='';
 for(const day of DAYS){
   const daySess=state.sessions.filter(s=>s.day===day);
   if(WE.includes(day) && daySess.length===0 && day==='일') continue;
   const[t0,t1]=axis(day);
   h+=`<section class="day ${WE.includes(day)?'we':''}"><h2 class="dh">${DAYN[day]}</h2>`;
   h+=`<div class="ln"><div class="rm"></div><div class="tk rlt">`+rulerH(day).map(x=>`<span style="left:${pct(x*60,t0,t1).toFixed(1)}%">${x}시</span>`).join('')+`</div></div>`;
   for(let room=1;room<=5;room++){
     const bl=daySess.filter(s=>s.room===room).sort((a,b)=>toMin(a.start)-toMin(b.start));
     let chips='';
     for(const s of bl){
       const st=toMin(s.start),en=st+s.dur;
       const L=pct(st,t0,t1),W=pct(en,t0,t1)-L;
       const sl=s.sub==='E'?'영어':'수학';
       chips+=`<div class="b ${s.sub==='E'?'e':'m'} ${errIds.has(s.id)?'err':''}" draggable="true" data-id="${s.id}" style="left:${L.toFixed(2)}%;width:${W.toFixed(2)}%">`
        +`<b>교실${room} · ${esc(s.ban)}</b><span>${sl} ${s.start}–${fmt(en)}</span><em>${esc(s.students.join(' '))}</em></div>`;
     }
     const empty=bl.length===0?'empty':'';
     h+=`<div class="ln"><div class="rm">교실${room}</div><div class="tk ${empty}" data-day="${day}" data-room="${room}">${chips}</div></div>`;
   }
   h+=`</section>`;
 }
 const bd=document.getElementById('board'); bd.innerHTML=h;
 bd.querySelectorAll('.b').forEach(el=>{
   el.addEventListener('click',()=>openEditor(el.dataset.id));
   el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',el.dataset.id);});
 });
 bd.querySelectorAll('.tk[data-day]').forEach(tk=>{
   tk.addEventListener('dragover',e=>{e.preventDefault();tk.classList.add('drop');});
   tk.addEventListener('dragleave',()=>tk.classList.remove('drop'));
   tk.addEventListener('drop',e=>{e.preventDefault();tk.classList.remove('drop');
     const id=e.dataTransfer.getData('text/plain');const s=state.sessions.find(x=>x.id===id);
     if(s){s.day=tk.dataset.day;s.room=+tk.dataset.room;persist();render();}
   });
 });
 showStatus(errs);
}
function esc(t){return String(t).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function validate(){
 const w=[]; const blockIds=new Set();
 const ss=state.sessions;
 for(const s of ss){
   if(s.students.length>10){w.push(`정원 초과 — ${DAYN[s.day]} 교실${s.room} ${esc(s.ban)} (${s.students.length}명)`);blockIds.add(s.id);}
   for(const n of s.students){const g=GRADES[n];if(!g)continue;const st=toMin(s.start);
     if(WD.includes(s.day)){
       if(g==='초6'&&st<900){w.push(`도착시간 — ${n}(초6)는 15:00 이후: ${DAYN[s.day]} ${s.start}`);blockIds.add(s.id);}
       else if(['중1','중2','중3'].includes(g)){const lim=['월','수','금'].includes(s.day)?960:1020;if(st<lim){w.push(`도착시간 — ${n}(${g})는 ${fmt(lim)} 이후: ${DAYN[s.day]} ${s.start}`);blockIds.add(s.id);}}
       else if(['고1','고2','고3'].includes(g)&&st<1110){w.push(`도착시간 — ${n}(${g})는 18:30 이후: ${DAYN[s.day]} ${s.start}`);blockIds.add(s.id);}
     }
   }
 }
 // 교실 중복
 for(let i=0;i<ss.length;i++)for(let j=i+1;j<ss.length;j++){const a=ss[i],b=ss[j];
   if(a.day===b.day&&a.room===b.room&&ov(a,b)){w.push(`교실 겹침 — ${DAYN[a.day]} 교실${a.room}: ${esc(a.ban)} ↔ ${esc(b.ban)}`);blockIds.add(a.id);blockIds.add(b.id);}
 }
 // 학생 겹침
 const byName={};
 for(const s of ss)for(const n of s.students){(byName[n]=byName[n]||[]).push(s);}
 for(const n in byName){const arr=byName[n];for(let i=0;i<arr.length;i++)for(let j=i+1;j<arr.length;j++){if(ov(arr[i],arr[j])){w.push(`학생 겹침 — ${n}: ${DAYN[arr[i].day]} 두 수업 시간 충돌`);blockIds.add(arr[i].id);blockIds.add(arr[j].id);}}}
 // 동시 강사(정보)
 let peakE=0,peakM=0;
 for(const day of DAYS){const ds=ss.filter(s=>s.day===day);const pts=new Set();ds.forEach(s=>{pts.add(toMin(s.start));pts.add(toMin(s.start)+s.dur);});
   pts.forEach(t=>{let e=0,m=0;ds.forEach(s=>{const st=toMin(s.start);if(st<=t&&t<st+s.dur){s.sub==='E'?e++:m++;}});peakE=Math.max(peakE,e);peakM=Math.max(peakM,m);});}
 const uniq=[...new Set(w)];
 return {list:uniq, blockIds:[...blockIds], peakE, peakM};
}
function ov(a,b){const as=toMin(a.start),ae=as+a.dur,bs=toMin(b.start),be=bs+b.dur;return a.day===b.day&&!(ae<=bs||be<=as);}

function showStatus(errs){
 const el=document.getElementById('status');
 const info=`동시 최대 — 영어방 ${errs.peakE}개, 수학방 ${errs.peakM}개 (그 시간대 필요한 과목별 강사 수)`;
 if(errs.list.length===0){el.className='status good';el.innerHTML=`문제 없음 · 충돌 0건 <span class="info">— ${info}</span>`;}
 else{el.className='status bad';el.innerHTML=`확인 필요 ${errs.list.length}건<ul>`+errs.list.map(x=>`<li>${x}</li>`).join('')+`</ul><span class="info">${info}</span>`;}
}

let editing=null;
function fillSelects(){
 const day=document.getElementById('f_day');day.innerHTML=DAYS.map(d=>`<option value="${d}">${DAYN[d]}</option>`).join('');
 const room=document.getElementById('f_room');room.innerHTML=[1,2,3,4,5].map(r=>`<option value="${r}">교실${r}</option>`).join('');
 const st=document.getElementById('f_start');let o='';for(let m=540;m<=1290;m+=30)o+=`<option value="${fmt(m)}">${fmt(m)}</option>`;st.innerHTML=o;
}
function openEditor(id){editing=id;const s=state.sessions.find(x=>x.id===id);if(!s)return;
 document.getElementById('mtitle').textContent='수업 편집';
 document.getElementById('f_id').value=s.id;
 document.getElementById('f_day').value=s.day;
 document.getElementById('f_sub').value=s.sub;
 document.getElementById('f_room').value=s.room;
 document.getElementById('f_start').value=s.start;
 document.getElementById('f_dur').value=s.dur;
 document.getElementById('f_ban').value=s.ban;
 document.getElementById('f_students').value=s.students.join(' ');
 document.getElementById('f_warn').textContent='';
 document.getElementById('ov').classList.add('on');
}
function applyEdit(){const s=state.sessions.find(x=>x.id===editing);if(!s)return;
 s.day=document.getElementById('f_day').value;
 s.sub=document.getElementById('f_sub').value;
 s.room=+document.getElementById('f_room').value;
 s.start=document.getElementById('f_start').value;
 s.dur=+document.getElementById('f_dur').value;
 s.ban=document.getElementById('f_ban').value.trim()||'반';
 s.students=document.getElementById('f_students').value.split(/[\s,]+/).map(x=>x.trim()).filter(Boolean);
 persist();closeModal();render();
}
function delSession(){if(!editing)return;if(!confirm('이 수업을 삭제할까요?'))return;
 state.sessions=state.sessions.filter(x=>x.id!==editing);persist();closeModal();render();}
function addSession(){const s={id:uid(),day:'월',start:'16:00',dur:120,room:1,sub:'E',ban:'새 반',students:[]};state.sessions.push(s);persist();render();openEditor(s.id);}
function closeModal(){editing=null;document.getElementById('ov').classList.remove('on');}
function resetAll(){if(!confirm('처음 상태(원래 시간표)로 되돌릴까요? 지금까지의 수정이 사라집니다.'))return;state=clone(DEFAULT);persist();render();}
function exportJSON(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='오르다_시간표.json';a.click();}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d&&d.sessions){state=d;persist();render();}else alert('시간표 파일 형식이 아닙니다.');}catch(x){alert('불러오기에 실패했습니다.');}};r.readAsText(f);e.target.value='';}
function printIt(){window.print();}
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeModal();});

if(!state.sessions)state={sessions:clone(DEFAULT)};
fillSelects();render();
</script>
