<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에듀케레 비즈니스 대시보드</title>
<style>
:root{
  --bg:#f4f5f7; --card:#ffffff; --ink:#1f2430; --sub:#6b7280; --line:#e5e7eb;
  --brand:#3b5bdb; --brand-soft:#edf2ff; --ok:#12b886; --warn:#f59f00; --bad:#e03131;
  --r:14px;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:"Malgun Gothic","맑은 고딕",Pretendard,-apple-system,sans-serif; background:var(--bg); color:var(--ink); font-size:15px;}
#app{display:flex; min-height:100vh;}
aside{width:220px; background:#1e2433; color:#cbd3e1; padding:20px 12px; flex-shrink:0;}
aside .logo{font-size:17px; font-weight:800; color:#fff; padding:6px 10px 18px;}
aside .logo small{display:block; font-weight:400; font-size:11px; color:#8b95a8; margin-top:4px;}
aside button{display:block; width:100%; text-align:left; background:none; border:none; color:#cbd3e1; padding:10px 12px; border-radius:10px; font-size:14px; cursor:pointer; margin-bottom:2px; font-family:inherit;}
aside button:hover{background:#2a3247;}
aside button.on{background:var(--brand); color:#fff; font-weight:700;}
aside .sec{font-size:11px; color:#7c8699; padding:14px 12px 6px; letter-spacing:1px;}
main{flex:1; padding:24px 28px; max-width:1100px;}
h1{font-size:21px; margin-bottom:4px;}
h2{font-size:16px; margin:18px 0 10px;}
.sub{color:var(--sub); font-size:13px; margin-bottom:16px;}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px 18px; margin-bottom:14px;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.grid4{display:grid; grid-template-columns:repeat(4,1fr); gap:12px;}
.bizcard{border-top:4px solid var(--bc,#888);}
.bizcard h3{font-size:15px; margin-bottom:6px;}
.badge{display:inline-block; font-size:11px; padding:2px 8px; border-radius:99px; background:var(--brand-soft); color:var(--brand); font-weight:700;}
.badge.ok{background:#e6fcf5; color:#0b7285;}
.badge.warn{background:#fff9db; color:#b08800;}
.badge.bad{background:#fff0f0; color:var(--bad);}
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th,td{padding:7px 8px; border-bottom:1px solid var(--line); text-align:left; vertical-align:middle;}
th{color:var(--sub); font-weight:600; font-size:12px; white-space:nowrap;}
td input,td select{width:100%;}
input,select,textarea{font-family:inherit; font-size:13.5px; padding:7px 9px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink);}
input:focus,select:focus,textarea:focus{outline:2px solid #bac8ff; border-color:var(--brand);}
textarea{width:100%; resize:vertical; min-height:64px; line-height:1.55;}
button.btn{background:var(--brand); color:#fff; border:none; border-radius:9px; padding:8px 14px; font-size:13.5px; font-weight:700; cursor:pointer; font-family:inherit;}
button.btn:hover{filter:brightness(1.08);}
button.btn.ghost{background:#fff; color:var(--brand); border:1px solid var(--brand);}
button.btn.sm{padding:4px 10px; font-size:12px;}
button.btn.gray{background:#eceef2; color:#444;}
button.del{background:none; border:none; color:#c0c4cc; cursor:pointer; font-size:15px;}
button.del:hover{color:var(--bad);}
.task{display:flex; align-items:center; gap:8px; padding:6px 2px; border-bottom:1px dashed var(--line);}
.task:last-child{border-bottom:none;}
.task label{flex:1; cursor:pointer;}
.task.done label{text-decoration:line-through; color:#aaa;}
.kv{margin-bottom:10px;}
.kv b{display:block; font-size:12px; color:var(--sub); margin-bottom:4px;}
.row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.num{font-variant-numeric:tabular-nums; text-align:right;}
.big{font-size:22px; font-weight:800;}
.bar{height:8px; background:var(--brand); border-radius:4px; min-width:2px;}
.barwrap{background:#eef0f4; border-radius:4px; width:100%;}
.alert{background:#fff9db; border:1px solid #ffe08a; border-radius:10px; padding:10px 14px; margin-bottom:8px; font-size:13.5px;}
.alert.red{background:#fff0f0; border-color:#ffc9c9;}
.chat{display:flex; flex-direction:column; gap:10px; max-height:52vh; overflow-y:auto; padding:6px 2px; margin-bottom:12px;}
.msg{max-width:82%; padding:10px 14px; border-radius:14px; line-height:1.6; white-space:pre-wrap; font-size:14px;}
.msg.user{align-self:flex-end; background:var(--brand); color:#fff; border-bottom-right-radius:4px;}
.msg.ai{align-self:flex-start; background:#fff; border:1px solid var(--line); border-bottom-left-radius:4px;}
.hint{font-size:12.5px; color:var(--sub); line-height:1.6;}
.plus{color:var(--ok); font-weight:700;} .minus{color:var(--bad); font-weight:700;}
.shead{display:flex;}
.sgrid{display:flex; border:1px solid var(--line); border-radius:12px; background:#fff; overflow:hidden; position:relative;}
.saxis{width:46px; position:relative; border-right:1px solid var(--line); flex-shrink:0; background:#fafbfc;}
.saxis span{position:absolute; right:6px; font-size:10.5px; color:var(--sub); transform:translateY(-50%);}
.scol{flex:1; position:relative; border-right:1px solid var(--line2); min-width:0;}
.scol:last-child{border-right:none;}
.sblk{position:absolute; left:3px; right:3px; border-radius:7px; color:#fff; font-size:11.5px; font-weight:600; padding:3px 6px; overflow:hidden; line-height:1.25; box-shadow:0 1px 3px rgba(0,0,0,.18);}
.sblk small{display:block; font-size:10px; font-weight:400; opacity:.85;}
.g65{table-layout:fixed;}
.g65 th,.g65 td{padding:4px; border:1px solid var(--line);}
.g65 th{background:#f6f7f9;}
.g65 input{width:100%; font-size:12.5px; padding:6px 7px;}
.g65 .fmt input{font-weight:700; background:#f8f9fb;}
.g65 .cellwrap{display:flex; flex-direction:column; gap:3px;}
.g65 .mini{font-size:10.5px; color:var(--brand); background:none; border:none; cursor:pointer; text-align:left; padding:0; font-family:inherit;}
.g65 .sent{font-size:10.5px; color:var(--ok);}
@media(max-width:840px){
  #app{flex-direction:column;}
  aside{width:100%; display:flex; flex-wrap:wrap; gap:4px; padding:10px;}
  aside .logo{width:100%; padding-bottom:8px;} aside .sec{display:none;}
  aside button{width:auto; padding:7px 11px; font-size:13px;}
  main{padding:16px;} .grid2,.grid4{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app">
  <aside id="nav"></aside>
  <main id="view"></main>
</div>
<script>
"use strict";
/* ===== 기본 데이터 ===== */
var LS_KEY = "educere_dashboard_v1";
var BIZ = [
  {id:"academy", name:"에듀케레 영수학원", short:"학원", color:"#4c6ef5"},
  {id:"gwan",    name:"에듀케레 바른학습관", short:"학습관", color:"#12b886"},
  {id:"evayon",  name:"에바연 바른교육연구소", short:"에바연", color:"#f76707"},
  {id:"studia",  name:"스터디아", short:"스터디아", color:"#7048e8"},
  {id:"hanglow", name:"한글로우 (HanGlow)", short:"한글로우", color:"#e64980"}
];
var STAGES = ["문의","상담예정","상담완료","등록·결제","보류"];
var CH = ["블로그","인스타그램","카카오채널","문자·알림톡","네이버카페","기타"];
var CSTAT = ["예정","작성중","발행완료"];
var DAYN = ["월","화","수","목","금","토","일"];
var METRIC_DEFS = [
  {k:"inq", label:"문의·신청"},
  {k:"con", label:"상담"},
  {k:"pay", label:"등록·결제"},
  {k:"rev", label:"매출(원)"}
];
function seed(){
  return {
    version:1, lastExport:null,
    biz:{
      academy:{ status:"로컬 운영 중 · 오르다 시스템 도입 진행", problem:"운영 어려움, 신규 유입/전환 압박", direction:"진단·관리를 앞세운 상담 + 오르다 14일 안착 + 재상담 루틴",
        tasks:[t("오르다 1단계 기술 확인 (배포·로그인·점수 저장)"),t("재상담 연락 대상 명단 뽑기"),t("재상담 메시지 초안 작성·발송")], memo:"" },
      gwan:{ status:"관리형 독서실 운영 중", problem:"운영 효율, 차별화, 유지율", direction:"주간 관리 리포트를 차별화 무기로 — '무엇이 막혔고 다음에 무엇을 할지'",
        tasks:[t("주간 관리 리포트에 넣을 항목 정하기"),t("리포트 샘플 1개 만들어 학부모 1~2명 반응 확인")], memo:"" },
      evayon:{ status:"온라인 전국구 브랜드 시도 중", problem:"이렇다 할 실적 부재", direction:"대표 무료 진단 1개 → 상담 신청 → 첫 결제 1건 만들기",
        tasks:[t("대표 무료 오퍼 확정 (수능최저 진단 vs 학생부 설계 준비도)"),t("바로 쓸 랜딩/자료 표시하기"),t("홍보 URL 1개 확정")], memo:"" },
      studia:{ status:"AI 학습앱 배포 완료 (studia.co.kr, 월 18,900원)", problem:"인지도 낮음, 가입자 극소수 (4월 기준 3명)", direction:"로컬 학생 실사용 → 후기 확보 → 구독 전환 · 학원 B2B 검토",
        tasks:[t("현재 가입자·결제자 수 확인해 기록"),t("가입 플로우 개편(결제수단 선등록) 구현 여부 확인"),t("랜딩에 '광고 없음·6과목·답베끼기 방지' 메시지 강조 검토")], memo:"" },
      hanglow:{ status:"외국인 대상 한국어 학습 앱 개발 중 (개인 프로젝트)", problem:"미출시 — 웹앱·학습 콘텐츠(발음·문법·회화·K컬처)와 백엔드 준비는 진행, 출시 단계 미완", direction:"작게라도 출시 가능한 1차 버전(웹 우선 여부) 정의 후 배포",
        tasks:[t("현재 개발 단계 기록 (백엔드 Phase 어디까지 완료?)"),t("배포 주소(도메인/GitHub Pages) 확정해 대시보드에 연결"),t("1차 출시 범위 정하기 (웹 먼저 vs 앱스토어)")], memo:"" }
    },
    metrics:{}, pipeline:[], contents:[], cash:[],
    schedule:{startHour:8, endHour:23, blocks:[]},
    grid:{ topics:["","","","","",""], formats:["핵심형","비교형","토크형","설명형","리스트형"], cells:{} },
    suggest:{items:[], at:null},
    orda:{weeks:{}, lastBackup:null},
    routines:[
      r("대시보드 백업(JSON 내보내기) + 오르다·스터디아 데이터 백업","매주"),
      r("주간 실적 입력·점검 (행동 지표만 본다)","매주"),
      r("후기·사례 수집 요청 (후기수집 키트 활용)","매주"),
      r("스터디아 구독·결제 오류 점검","매주"),
      r("학부모 공지·소식 발송","매월"),
      r("원천세 신고·납부 (매월 10일)","매월"),
      r("장부·현금흐름 정리","매월"),
      r("부가가치세 신고 (1·4·7·10월 25일)","분기"),
      r("가격·약관·개인정보처리방침 점검","분기")
    ],
    chat:[], settings:{apiKey:"", model:"claude-sonnet-5"}
  };
}
function t(x){ return {id:uid(), text:x, done:false}; }
function r(x,c){ return {id:uid(), text:x, cycle:c, lastDone:null}; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
/* ===== 상태 ===== */
var state;
try{ state = JSON.parse(localStorage.getItem(LS_KEY)) || seed(); }catch(e){ state = seed(); }
if(!state.schedule) state.schedule = {startHour:8, endHour:23, blocks:[]};
if(!state.grid) state.grid = { topics:["","","","","",""], formats:["핵심형","비교형","토크형","설명형","리스트형"], cells:{} };
if(!state.suggest) state.suggest = {items:[], at:null};
if(!state.orda) state.orda = {weeks:{}, lastBackup:null};
if(!state.biz.hanglow) state.biz.hanglow = { status:"외국인 대상 한국어 학습 앱 개발 중 (개인 프로젝트)", problem:"미출시 — 웹앱·학습 콘텐츠(발음·문법·회화·K컬처)와 백엔드 준비는 진행, 출시 단계 미완", direction:"작게라도 출시 가능한 1차 버전(웹 우선 여부) 정의 후 배포", tasks:[t("현재 개발 단계 기록 (백엔드 Phase 어디까지 완료?)"),t("배포 주소(도메인/GitHub Pages) 확정해 대시보드에 연결"),t("1차 출시 범위 정하기 (웹 먼저 vs 앱스토어)")], memo:"" };
if(!state.routines.some(function(x){return x.text.indexOf("오르다 주간 점검")>=0;})) state.routines.push(r("오르다 주간 점검 수치 입력 (납부·미션·피드백)","매주"));
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
/* ===== 유틸 ===== */
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmt(n){ n=Number(n)||0; return n.toLocaleString("ko-KR"); }
function todayStr(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function monthStr(){ return todayStr().slice(0,7); }
function mondayOf(dstr){
  var d = dstr? new Date(dstr+"T00:00:00") : new Date();
  var day = d.getDay(); var diff = (day===0? -6 : 1-day);
  d.setDate(d.getDate()+diff);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function shiftWeek(wk, n){ var d=new Date(wk+"T00:00:00"); d.setDate(d.getDate()+n*7); return mondayOf(d.toISOString().slice(0,10)); }
function weekLabel(wk){ var d=new Date(wk+"T00:00:00"); var e=new Date(d); e.setDate(e.getDate()+6); return (d.getMonth()+1)+"/"+d.getDate()+" ~ "+(e.getMonth()+1)+"/"+e.getDate(); }
function daysSince(dstr){ if(!dstr) return 9999; return Math.floor((new Date(todayStr())-new Date(dstr))/86400000); }
function bizName(id){ var b=BIZ.find(function(x){return x.id===id;}); return b? b.short : id; }
function getMetric(wk,bid){ if(!state.metrics[wk]) state.metrics[wk]={}; if(!state.metrics[wk][bid]) state.metrics[wk][bid]={inq:0,con:0,pay:0,rev:0,note:""}; return state.metrics[wk][bid]; }
/* ===== 라우팅 ===== */
var route = "home";
var curWeek = mondayOf();
var curMonth = monthStr();
function go(rt){ route = rt; render(); }
var NAV = [
  ["home","🏠 통합 홈"],
  ["_sec","사업별"],
  ["biz:academy","영수학원"],
  ["biz:gwan","바른학습관"],
  ["biz:evayon","에바연"],
  ["biz:studia","스터디아"],
  ["biz:hanglow","한글로우"],
  ["_sec","운영"],
  ["sched","🗓 주간 일정표"],
  ["metrics","📊 주간 실적"],
  ["pipe","👥 상담 파이프라인"],
  ["cal","📅 콘텐츠 캘린더"],
  ["grid","🧩 콘텐츠 기획 6×5"],
  ["cash","💰 현금흐름"],
  ["routine","✅ 운영 루틴"],
  ["_sec","도구"],
  ["ai","🤖 AI 어시스턴트"],
  ["auto","🔁 자동 예약 작업"],
  ["set","⚙️ 설정·백업"]
];
function renderNav(){
  var h = '<div class="logo">에듀케레 대시보드<small>1인 운영 통합 관리</small></div>';
  NAV.forEach(function(n){
    if(n[0]==="_sec"){ h += '<div class="sec">'+n[1]+'</div>'; return; }
    h += '<button class="'+(route===n[0]?"on":"")+'" onclick="App.go(\''+n[0]+'\')">'+n[1]+'</button>';
  });
  document.getElementById("nav").innerHTML = h;
}
/* ===== 화면: 통합 홈 ===== */
function vHome(){
  var wk = mondayOf();
  var alerts = [];
  var due = state.routines.filter(function(x){ return routineDue(x); });
  if(due.length) alerts.push('<div class="alert">⏰ 할 차례가 된 운영 루틴이 <b>'+due.length+'건</b> 있어요. <button class="btn sm ghost" onclick="App.go(\'routine\')">보러 가기</button></div>');
  var follow = state.pipeline.filter(function(p){ return p.stage==="문의"||p.stage==="상담예정"; });
  if(follow.length) alerts.push('<div class="alert">👥 연락·상담을 기다리는 고객이 <b>'+follow.length+'명</b> 있어요. <button class="btn sm ghost" onclick="App.go(\'pipe\')">파이프라인</button></div>');
  var wm = state.metrics[wk];
  if(!wm) alerts.push('<div class="alert">📊 이번 주 실적이 아직 비어 있어요. 일주일에 한 번만 입력하면 됩니다. <button class="btn sm ghost" onclick="App.go(\'metrics\')">입력하기</button></div>');
  if(daysSince(state.lastExport) > 7) alerts.push('<div class="alert red">💾 마지막 백업 후 '+(state.lastExport? daysSince(state.lastExport)+"일":"기록 없음")+' — 설정에서 JSON 백업을 내려받아 두세요. <button class="btn sm ghost" onclick="App.go(\'set\')">백업하기</button></div>');
  var dow = (new Date().getDay()+6)%7;
  var tb = (state.schedule && state.schedule.blocks ? state.schedule.blocks : []).filter(function(b){return +b.day===dow;}).sort(function(a,b){return toMin(a.start)-toMin(b.start);});
  var todayCard = tb.length ? '<div class="card"><h2 style="margin-top:0">오늘 일정 ('+DAYN[dow]+'요일)</h2>'+tb.map(function(b){
      var c = schedCat(b.cat);
      return '<div class="task"><span class="badge" style="background:'+c.color+';color:#fff">'+esc(c.short)+'</span><label>'+esc(b.start)+'–'+esc(b.end)+' '+esc(b.label)+'</label></div>';
    }).join("")+'<div style="margin-top:8px"><button class="btn sm ghost" onclick="App.go(\'sched\')">주간 일정표 →</button></div></div>' : "";
  var tot = {inq:0,con:0,pay:0,rev:0};
  BIZ.forEach(function(b){ var m=getMetric(wk,b.id); tot.inq+=+m.inq||0; tot.con+=+m.con||0; tot.pay+=+m.pay||0; tot.rev+=+m.rev||0; });
  var cards = BIZ.map(function(b){
    var d = state.biz[b.id];
    var open = d.tasks.filter(function(x){return !x.done;});
    var m = getMetric(wk,b.id);

  }
  if(state.pipeline.length){
    lines.push("[파이프라인]");

  }
  var due = state.routines.filter(routineDue).map(function(x){return x.text;});

  var mc = state.cash.filter(function(c){return c.month===monthStr();});
  if(mc.length){ var i=0,o=0; mc.forEach(function(c){ if(c.type==="수입") i+=+c.amount||0; else o+=+c.amount||0; }); lines.push("[이번 달 현금흐름] 수입 "+i+"원, 지출 "+o+"원, 순 "+(i-o)+"원"); }
  var up = state.contents.filter(function(c){return c.status!=="발행완료";}).slice(0,10);
  if(up.length){ lines.push("[예정 콘텐츠]"); up.forEach(function(c){ lines.push("- "+(c.date||"날짜미정")+" "+bizName(c.biz)+" "+c.channel+" : "+c.title+" ("+c.status+")"); }); }
  var dow2 = (new Date().getDay()+6)%7;
  var tb2 = (state.schedule && state.schedule.blocks ? state.schedule.blocks : []).filter(function(b){return +b.day===dow2;}).sort(function(a,b){return toMin(a.start)-toMin(b.start);});
  if(tb2.length){ lines.push("[오늘 일정]"); tb2.forEach(function(b){ lines.push("- "+b.start+"~"+b.end+" ["+schedCat(b.cat).short+"] "+b.label); }); }
  if(state.orda){
    var ow = (state.orda.weeks||{})[mondayOf()];
    if(ow && (ow.pay!==""||ow.unpaid!==""||ow.mission!==""||ow.nofb!==""||ow.low!==""||ow.gwanCnt!=="")){
      lines.push("[오르다 주간 점검] 납부율 "+(ow.pay||"?")+"%, 미납 "+(ow.unpaid||"?")+"명, 7일 미션완료율 "+(ow.mission||"?")+"%, 2주 무피드백 "+(ow.nofb||"?")+"명, 완료율 50% 미만 "+(ow.low||"?")+"명, 학습관 이용 "+(ow.gwanCnt||"?")+"명"+(ow.note? " ("+ow.note+")":""));
    }
    if(state.orda.lastBackup) lines.push("[오르다 마지막 백업] "+state.orda.lastBackup+" ("+daysSince(state.orda.lastBackup)+"일 전)");
  }
  if(state.grid){
    var gt = state.grid.topics.filter(Boolean), gf = state.grid.formats.filter(Boolean);
    var gfilled = 0;
    for(var gr=0;gr<5;gr++){ for(var gc=0;gc<6;gc++){ var gcc=(state.grid.cells||{})["r"+gr+"c"+gc]; if(gcc && gcc.text) gfilled++; } }

  }
  return lines.join("\n");
}

function ask(){
  var inp = document.getElementById("aiInput");
  var q = inp.value.trim();
  if(!q) return;
  if(!state.settings.apiKey){ setAIStatus("설정에서 API 키를 먼저 입력해주세요."); return; }
  state.chat.push({role:"user", text:q});
  if(state.chat.length>40) state.chat = state.chat.slice(-40);
  save(); render();
  setAIStatus("생각하는 중…");
  var msgs = state.chat.map(function(m){ return {role: m.role==="user"?"user":"assistant", content: m.text}; });
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "content-type":"application/json",
      "x-api-key": state.settings.apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body: JSON.stringify({ model: state.settings.model, max_tokens: 1500,
      system: SYS_PROMPT+"\n\n=== 대시보드 데이터 ===\n"+buildContext(), messages: msgs })
  }).then(function(res){ return res.json(); }).then(function(data){
    if(data && data.content && data.content.length){
      var txt = data.content.map(function(c){ return c.text||""; }).join("");
      state.chat.push({role:"ai", text:txt});
      save(); render(); setAIStatus("");
    } else if(data && data.error){
      var m = data.error.message||"오류";
      if(data.error.type==="authentication_error") m = "API 키가 올바르지 않습니다. 설정에서 다시 확인해주세요.";
      setAIStatus("⚠️ "+m);
    } else { setAIStatus("⚠️ 알 수 없는 응답입니다."); }
  }).catch(function(e){ setAIStatus("⚠️ 연결 실패: 인터넷 연결과 API 키를 확인해주세요. ("+e.message+")"); });
}

function schedCats(){ return BIZ.concat([{id:"common", name:"공통·개인", short:"공통", color:"#868e96"}]); }
function toMin(t){ var p=String(t||"0:0").split(":"); return (parseInt(p[0],10)||0)*60+(parseInt(p[1],10)||0); }
function schedCat(id){ return schedCats().find(function(x){return x.id===id;}) || {short:"공통", color:"#868e96"}; }
function vSched(){
  var sc = state.schedule;
  var startM = sc.startHour*60, endM = sc.endHour*60, span = Math.max(endM-startM,60);
  var H = 600, hourPx = H*60/span;
  var cols = "";
  for(var i=0;i<7;i++){
    var blocks = sc.blocks.filter(function(b){return +b.day===i;});
    var bs = blocks.map(function(b){
      var c = schedCat(b.cat);
      var top = (toMin(b.start)-startM)/span*H;
      var h = Math.max((toMin(b.end)-toMin(b.start))/span*H, 16);
      if(top < 0){ h += top; top = 0; }
      if(top >= H || h <= 0) return "";
      if(top+h > H) h = H-top;
      return '<div class="sblk" style="top:'+top+'px;height:'+h+'px;background:'+c.color+'" title="'+esc(b.label)+'">'+esc(b.label)+'<small>'+esc(b.start)+'–'+esc(b.end)+'</small></div>';
    }).join("");

  }
  var axis = "";
  for(var hh=sc.startHour+1; hh<sc.endHour; hh++){

      '<td style="width:36px"><button class="del" onclick="App.delSchedBlk(\''+b.id+'\')">✕</button></td></tr>';
  }).join("") || '<tr><td colspan="7" class="hint">아직 일정이 없습니다. "+ 일정 추가"로 반복되는 한 주 일과(수업, 순회, 상담 시간, 콘텐츠 작성, 스터디아 점검)를 넣어보세요.</td></tr>';

function autoFmtNext(dt){
  var wd=["일","월","화","수","목","금","토"];
  return (dt.getMonth()+1)+"월 "+dt.getDate()+"일("+wd[dt.getDay()]+") "+String(dt.getHours()).padStart(2,"0")+":00";
}
function autoNextRun(a){
  try{
    var now = new Date();
    if(a.cad==="weekday"){
      for(var i=0;i<15;i++){
        var c = new Date(now.getFullYear(), now.getMonth(), now.getDate()+i, a.hour, 0, 0, 0);
        var dow = c.getDay();
        if(dow>=1 && dow<=5 && c>now) return autoFmtNext(c);
      }
    } else if(a.cad==="monthly"){
      var m = new Date(now.getFullYear(), now.getMonth(), a.day, a.hour, 0, 0, 0);
      if(m<=now) m = new Date(now.getFullYear(), now.getMonth()+1, a.day, a.hour, 0, 0, 0);
      return autoFmtNext(m);
    }
  }catch(e){}
  return a.when;
}
